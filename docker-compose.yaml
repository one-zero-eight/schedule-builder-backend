# This is a Docker Compose configuration for local use.

# Run all services:
# docker compose up --build --detach

services:
  api:
    build: . # See Dockerfile for more details
    ports:
      - "8012:8000"
    volumes:
      - "./settings.yaml:/app/settings.yaml:ro" # Read-only settings file
      - "data:/app/data"
    deploy:
      # Change limits if project needs more RAM, though try to stay within limits
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 500m

volumes:
  data:
